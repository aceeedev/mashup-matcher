services:
  # The Flask Backend
  # backend:
  #   build:
  #     context: ./backend
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - MONGO_URI=mongodb://root:example_password@mongodb:27017/mashup_db?authSource=admin
  #   depends_on:
